name: UniEnter
options:
  bundleIdPrefix: dev.iwai
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Manual
    # Apple Development証明書(ハッシュ指定)。ad-hoc署名("-")はビルドごとに
    # 署名が変わりTCC(アクセシビリティ許可)が無効化されるため使わない。
    CODE_SIGN_IDENTITY: "D24D0257C11BEBF3858CF1A8755F6A5D8E41BF9D"
targets:
  UniEnter:
    type: application
    platform: macOS
    sources: [UniEnter]
    info:
      path: UniEnter/Info.plist
      properties:
        CFBundleDisplayName: UniEnter
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.iwai.UniEnter
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: [UniEnterTests]
  UniEnterTests:
    type: bundle.unit-test
    platform: macOS
    sources: [UniEnterTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: UniEnter
