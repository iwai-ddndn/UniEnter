name: UniEnter
options:
  bundleIdPrefix: dev.iwai
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
targets:
  UniEnter:
    type: application
    platform: macOS
    sources: [UniEnter]
    info:
      path: UniEnter/Info.plist
      properties:
        CFBundleDisplayName: UniEnter
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.iwai.UniEnter
    scheme: {}
